<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход через GitHub — WAF Panel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .page-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    padding: 24px;
  }
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .brand-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, #6366f1, #818cf8);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 28px rgba(99,102,241,0.3);
  }
  .brand-icon svg { width: 26px; height: 26px; fill: #fff; }
  .brand-name { font-size: 22px; font-weight: 800; color: #6366f1; letter-spacing: -0.5px; }
  .brand-sub { font-size: 12px; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; }
  .card {
    background: #1a1d2e;
    border: 1px solid #2d3250;
    border-radius: 16px;
    padding: 36px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  h2 { font-size: 19px; font-weight: 700; text-align: center; margin-bottom: 8px; color: #e2e8f0; }
  .subtitle { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 28px; }
  .btn-github {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: #238636;
    color: #fff;
    border: 1px solid #2ea043;
    border-radius: 8px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background .15s, transform .1s;
    margin-bottom: 12px;
  }
  .btn-github:hover { background: #2ea043; transform: translateY(-1px); }
  .btn-cancel {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    background: transparent;
    color: #64748b;
    border: 1px solid #2d3250;
    border-radius: 8px;
    padding: 11px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: background .15s, color .15s;
  }
  .btn-cancel:hover { background: #2d3250; color: #94a3b8; }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    </div>
    <div class="brand-name">WAF Panel</div>
    <div class="brand-sub">OAuth Авторизация</div>
  </div>
  <div class="card">
    <h2>Вход через GitHub</h2>
    <p class="subtitle">Для продолжения войдите с помощью вашего аккаунта GitHub</p>
    <form method="post">
      {% csrf_token %}
      {% if form %}{{ form.as_p }}{% endif %}
      <button type="submit" class="btn-github">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        Продолжить с GitHub
      </button>
    </form>
    <a href="{% url 'login' %}" class="btn-cancel">Вернуться к входу</a>
  </div>
</div>
</body>
</html>
