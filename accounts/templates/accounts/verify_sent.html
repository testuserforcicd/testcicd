<!DOCTYPE html>
<html>
<head>
    <title>Подтверждение почты</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h2 { color: #2c3e50; }
        p { color: #7f8c8d; line-height: 1.5; }
        .icon { font-size: 3rem; color: #3498db; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"></div>
        <h2>Почти готово!</h2>
        <p>Мы отправили письмо на адрес <strong>{{ email }}</strong>.</p>
        <p>Пожалуйста, проверьте вашу почту и перейдите по ссылке для активации аккаунта.</p>
        <hr>
        <p><small>Не пришло письмо? Проверьте папку "Спам".</small></p>
    </div>
</body>
</html>
