<!DOCTYPE html>
<html>
<head><title>Вход в систему</title></head>
<body>
    <h2>Авторизация</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>
    {% load socialaccount %}
    <hr>
    <a href="{% provider_login_url 'github' %}">Войти через GitHub</a>
    <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</body>
</html>
