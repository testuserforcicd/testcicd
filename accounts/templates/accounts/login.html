<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход — WAF</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    background: #1a1d2e;
    border: 1px solid #2d3250;
    border-radius: 12px;
    padding: 40px 48px;
    width: 100%;
    max-width: 420px;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    color: #6366f1;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 32px;
  }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: #e2e8f0; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
  .form-group input {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2d3250;
    border-radius: 6px;
    padding: 10px 14px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .form-group input:focus { border-color: #6366f1; }
  .btn-submit {
    width: 100%;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    margin-top: 4px;
  }
  .btn-submit:hover { background: #5055d8; }
  .error-list {
    background: #4c0519;
    border: 1px solid #7f1d1d;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #f87171;
  }
  .footer-links {
    margin-top: 20px;
    font-size: 13px;
    color: #64748b;
    text-align: center;
  }
  .footer-links a { color: #6366f1; text-decoration: none; }
  .footer-links a:hover { text-decoration: underline; }
  .divider { border: none; border-top: 1px solid #2d3250; margin: 20px 0; }
  .btn-github {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: #2d3250;
    color: #94a3b8;
    border: 1px solid #374162;
    border-radius: 6px;
    padding: 10px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: background .15s;
  }
  .btn-github:hover { background: #374162; color: #e2e8f0; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">WAF Panel</div>
  <div class="subtitle">Система защиты веб-приложений</div>
  <h2>Вход в систему</h2>

  {% if form.errors %}
  <div class="error-list">
    Неверное имя пользователя или пароль. Попробуйте снова.
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_username">Имя пользователя</label>
      <input type="text" name="username" id="id_username" autofocus placeholder="Введите логин">
    </div>
    <div class="form-group">
      <label for="id_password">Пароль</label>
      <input type="password" name="password" id="id_password" placeholder="Введите пароль">
    </div>
    <button type="submit" class="btn-submit">Войти</button>
  </form>

  <div class="divider">или</div>
  {% load socialaccount %}
  <a href="{% provider_login_url 'github' %}" class="btn btn-github">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
    Войти через GitHub
  </a>

  <div class="links">
    Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
  </div>
</div>
</body>
</html>
