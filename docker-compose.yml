version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: waf_db
      POSTGRES_USER: waf_user
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" 

  nginx:
    image: openresty/openresty:alpine-fat
    ports:
      - "80:80"
      - "8001:8001"
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web
      - engine
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn waf_project.wsgi:application --bind 0.0.0.0:8000 --timeout 120"
    volumes:
      - .:/app 
      - static_volume:/app/static
      - media_volume:/app/media  
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=waf_db
      - DB_USER=waf_user
      - DB_PASSWORD=secretpassword
      - DB_HOST=db
      - DB_PORT=5432

  juice-shop:
    image: bkimminich/juice-shop
    ports:
      - "3000:3000" 
    networks:
      - default

  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    ports:
      - "8080:8080"
    volumes:               
      - .:/app            
    depends_on:
      - db
    environment:
      - DB_NAME=waf_db
      - DB_USER=waf_user
      - DB_PASSWORD=secretpassword
      - DB_HOST=db
      - DB_PORT=5432
      - PYTHONUNBUFFERED=1
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.web
    command: celery -A waf_project worker --loglevel=info
    volumes:
      - .:/app
      - media_volume:/app/media  
    environment:
      - DB_NAME=waf_db
      - DB_USER=waf_user
      - DB_PASSWORD=secretpassword
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
      - redis

  

volumes:
  postgres_data:
  static_volume:
  media_volume:
