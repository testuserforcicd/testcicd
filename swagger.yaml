openapi: 3.0.3
info:
  title: WAF API
  version: 1.0.0
  description: REST API для управления Web Application Firewall. Аутентификация через
    Bearer-токен. Ошибки возвращаются в формате Problem Details (RFC 7807/9457).
paths:
  /api/v1/waf-status/:
    get:
      operationId: waf_status_retrieve
      description: 'Возвращает, защищён ли домен WAF и на какой IP проксировать трафик.


        Используется nginx/движком WAF. **Аутентификация не требуется.**'
      summary: Получить статус защиты домена
      parameters:
      - in: query
        name: domain
        schema:
          type: string
        description: 'Домен для проверки, например: example.com'
        required: true
      tags:
      - WAF Engine
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WAFStatusResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                400BadRequest:
                  value:
                    requestId: 018f1a2b-3c4d-7e5f-8a9b-0c1d2e3f4a5e
                    title: Bad Request
                    detail: Запрос содержит некорректные данные. Проверьте тело запроса.
                    timestamp: '2025-04-27T12:00:00Z'
                  summary: 400 Bad Request
          description: Некорректный запрос.
        '405':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: HTTP-метод не поддерживается.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Внутренняя ошибка сервера.
    post:
      operationId: waf_status_create
      description: 'Возвращает, защищён ли домен WAF и на какой IP проксировать трафик.


        Используется nginx/движком WAF. **Аутентификация не требуется.**'
      summary: Получить статус защиты домена
      parameters:
      - in: query
        name: domain
        schema:
          type: string
        description: 'Домен для проверки, например: example.com'
        required: true
      tags:
      - WAF Engine
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WAFStatusResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              examples:
                400BadRequest:
                  value:
                    requestId: 018f1a2b-3c4d-7e5f-8a9b-0c1d2e3f4a5e
                    title: Bad Request
                    detail: Запрос содержит некорректные данные. Проверьте тело запроса.
                    timestamp: '2025-04-27T12:00:00Z'
                  summary: 400 Bad Request
          description: Некорректный запрос.
        '405':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: HTTP-метод не поддерживается.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
          description: Внутренняя ошибка сервера.
  /api/v1/sites/:
    get:
      operationId: sites_list
      description: Возвращает все сайты текущего пользователя (по токену).
      summary: Список защищённых сайтов
      tags:
      - Sites
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
