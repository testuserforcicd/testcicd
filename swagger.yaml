components:
  schemas:
    AccessToken:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название
          maxLength: 100
        token:
          type: string
          readOnly: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        blocked_ips_list:
          type: string
          readOnly: true
      required:
      - blocked_ips_list
      - created_at
      - id
      - name
      - token
    AccessTokenCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          title: Название
          maxLength: 100
      required:
      - name
    ActionEnum:
      enum:
      - block
      - allow
      - log
      type: string
      description: '* `block` - Блокировать

        * `allow` - Разрешить

        * `log` - Только логировать'
    AdminMessage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        message:
          type: string
          readOnly: true
          title: Сообщение
        created_at:
          type: string
          format: date-time
          readOnly: true
        is_read:
          type: boolean
          readOnly: true
      required:
      - created_at
      - id
      - is_read
      - message
      - username
    BannedIP:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        site_domain:
          type: string
          readOnly: true
        ip_address:
          type: string
          readOnly: true
        reason:
          type: string
          readOnly: true
        banned_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        attack_count:
          type: integer
          readOnly: true
          description: Количество атак перед баном
        time_window_minutes:
          type: integer
          readOnly: true
          description: Временное окно в минутах
      required:
      - attack_count
      - banned_at
      - expires_at
      - id
      - ip_address
      - is_active
      - reason
      - site_domain
      - time_window_minutes
    BlockIPBodyRequest:
      type: object
      properties:
        ip:
          type: string
          minLength: 1
      required:
      - ip
    BlockIPResult:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    DeletedMsg:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    ExportDeleted:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    ExportStarted:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    LogExport:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
      required:
      - name
      - url
    Monitoring:
      type: object
      properties:
        cpu_percent:
          type: number
          format: double
        ram_total_gb:
          type: number
          format: double
        ram_used_gb:
          type: number
          format: double
        ram_percent:
          type: number
          format: double
        disk_total_gb:
          type: number
          format: double
        disk_used_gb:
          type: number
          format: double
        disk_percent:
          type: number
          format: double
        requests_per_minute:
          type: integer
        db_ok:
          type: boolean
      required:
      - cpu_percent
      - db_ok
      - disk_percent
      - disk_total_gb
      - disk_used_gb
      - ram_percent
      - ram_total_gb
      - ram_used_gb
      - requests_per_minute
    MsgRead:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    PatchedProtectedSiteCreateRequest:
      type: object
      properties:
        domain:
          type: string
          minLength: 1
          title: Домен
          maxLength: 255
        target_ip:
          type: string
          minLength: 1
          maxLength: 100
        is_protected:
          type: boolean
          title: Защита активна
        traffic_limit_mb:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Лимит трафика (МБ, 0=без лимита)
    PatchedUserUpdateRequest:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/RoleEnum'
        tariff_plan:
          allOf:
          - $ref: '#/components/schemas/TariffPlanEnum'
          title: Тарифный план
        is_blocked:
          type: boolean
    PatchedWAFRuleCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          title: Название правила
          maxLength: 200
        pattern:
          type: string
          minLength: 1
          title: Сигнатура / паттерн
        description:
          type: string
          title: Описание
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        action:
          $ref: '#/components/schemas/ActionEnum'
        is_active:
          type: boolean
          title: Активно
    ProblemDetail:
      type: object
      properties:
        requestId:
          type: string
          description: UUIDv7 уникальный идентификатор запроса
        title:
          type: string
          description: Краткое описание ошибки
        detail:
          type: string
          description: Подробное описание и способ устранения
        timestamp:
          type: string
          description: Метка времени UTC (ISO 8601)
      required:
      - detail
      - requestId
      - timestamp
      - title
    ProtectedSite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        domain:
          type: string
          title: Домен
          maxLength: 255
        target_ip:
          type: string
          maxLength: 100
        is_protected:
          type: boolean
          title: Защита активна
        traffic_limit_mb:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Лимит трафика (МБ, 0=без лимита)
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - domain
      - id
      - target_ip
    ProtectedSiteCreateRequest:
      type: object
      properties:
        domain:
          type: string
          minLength: 1
          title: Домен
          maxLength: 255
        target_ip:
          type: string
          minLength: 1
          maxLength: 100
        is_protected:
          type: boolean
          title: Защита активна
        traffic_limit_mb:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Лимит трафика (МБ, 0=без лимита)
      required:
      - domain
      - target_ip
    RequestLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        site_domain:
          type: string
          readOnly: true
          nullable: true
        ip_address:
          type: string
          readOnly: true
        method:
          type: string
          readOnly: true
        path:
          type: string
          readOnly: true
        status_code:
          type: integer
          readOnly: true
        was_blocked:
          type: boolean
          readOnly: true
        rule_name:
          type: string
          readOnly: true
          nullable: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        user_agent:
          type: string
          readOnly: true
      required:
      - id
      - ip_address
      - method
      - path
      - rule_name
      - site_domain
      - status_code
      - timestamp
      - user_agent
      - was_blocked
    RoleEnum:
      enum:
      - user
      - admin
      type: string
      description: '* `user` - Пользователь

        * `admin` - Администратор'
    RuleDeleted:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    RuleToggled:
      type: object
      properties:
        id:
          type: integer
        is_active:
          type: boolean
      required:
      - id
      - is_active
    SessionDeleted:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    SessionList:
      type: object
      properties:
        session_key:
          type: string
        user_id:
          type: integer
          nullable: true
        username:
          type: string
          nullable: true
        expires:
          type: string
          format: date-time
      required:
      - expires
      - session_key
      - user_id
      - username
    SeverityEnum:
      enum:
      - low
      - medium
      - high
      - critical
      type: string
      description: '* `low` - Низкая

        * `medium` - Средняя

        * `high` - Высокая

        * `critical` - Критическая'
    TariffPlanEnum:
      enum:
      - free
      - basic
      - pro
      type: string
      description: '* `free` - Бесплатный

        * `basic` - Базовый

        * `pro` - Pro'
    TokenDeleted:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    TokenToggled:
      type: object
      properties:
        id:
          type: integer
        is_active:
          type: boolean
      required:
      - id
      - is_active
    UnblockIPBodyRequest:
      type: object
      properties:
        ip:
          type: string
          minLength: 1
      required:
      - ip
    UnblockIPResult:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        tariff_plan:
          allOf:
          - $ref: '#/components/schemas/TariffPlanEnum'
          title: Тарифный план
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        is_blocked:
          type: boolean
        is_email_verified:
          type: boolean
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_joined
      - id
      - is_email_verified
      - username
    UserStats:
      type: object
      properties:
        total_requests:
          type: integer
        blocked_requests:
          type: integer
        sqli_attacks:
          type: integer
        xss_attacks:
          type: integer
      required:
      - blocked_requests
      - sqli_attacks
      - total_requests
      - xss_attacks
    WAFRule:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название правила
          maxLength: 200
        pattern:
          type: string
          title: Сигнатура / паттерн
        description:
          type: string
          title: Описание
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        action:
          $ref: '#/components/schemas/ActionEnum'
        is_active:
          type: boolean
          title: Активно
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - pattern
      - updated_at
    WAFRuleCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          title: Название правила
          maxLength: 200
        pattern:
          type: string
          minLength: 1
          title: Сигнатура / паттерн
        description:
          type: string
          title: Описание
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        action:
          $ref: '#/components/schemas/ActionEnum'
        is_active:
          type: boolean
          title: Активно
      required:
      - name
      - pattern
    WAFStatusResponse:
      type: object
      properties:
        domain:
          type: string
        is_protected:
          type: boolean
        target_ip:
          type: string
          nullable: true
      required:
      - domain
      - is_protected
      - target_ip
