name: WAF Build and Test Pipeline

# 1. Настраиваем триггеры (когда должен запускаться пайплайн)
on:
  push:
    branches:
      - main
      - last_fix
    tags:
      - 'v*.*.*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Выделяем виртуальную машину на Linux
    permissions:
      contents: write
    steps:
    # Шаг 1: Скачиваем исходный код из твоего репозитория на виртуалку
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    # Шаг 2: Устанавливаем Python
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    # Шаг 3: Установка зависимостей проекта
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Устанавливаем линтер flake8
        pip install flake8
        # Если есть файл с зависимостями Django, устанавливаем и их
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Шаг 4: Запуск статического анализатора кода (Linter)
    - name: Run Linter (flake8)
      run: |
        # Проверяем код на критические синтаксические ошибки
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exit-zero
        # Проверяем на соответствие стилю (опционально, не уронит сборку при мелких недочетах)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Шаг 5: Статический анализ кода на уязвимости (SAST)
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    # Шаг 6: Авторизация в GitLab Container Registry
    - name: Log in to GitLab Container Registry
      uses: docker/login-action@v3
      with:
        registry: registry.gitlab.com
        username: ${{ secrets.GITLAB_USERNAME }}
        password: ${{ secrets.GITLAB_TOKEN }}

    # Шаг 7: Сборка Docker-образа
    - name: Build Docker image
      run: |
        docker build -f Dockerfile.web -t registry.gitlab.com/testuserforcicd/testuserforcicd-project/waf-web:latest .
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'registry.gitlab.com/testuserforcicd/testuserforcicd-project/waf-web:latest'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # Шаг 9: Отправка Docker-образа в реестр GitLab
    - name: Push Docker image to GitLab Registry
      run: |
        docker push registry.gitlab.com/testuserforcicd/testuserforcicd-project/waf-web:latest

    # Шаг 10: Создание релиза (сработает ТОЛЬКО при пуше Git-тега vX.Y.Z)
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true